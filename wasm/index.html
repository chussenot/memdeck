<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MemDeck — Memorized Deck Trainer</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <div id="loading">
      <div class="loading-logo">MemDeck</div>
      <div class="loading-spinner"></div>
      <div class="loading-msg">Loading…</div>
    </div>
    <div id="screen" class="hidden"></div>
  </div>

  <!--
    memdeck.js is generated by `make` in this directory (Emscripten output).
    It loads memdeck.wasm alongside itself.
    To build:  cd wasm && make
    To serve:  cd wasm && make serve   (or: python3 -m http.server from parent)
  -->
  <script src="memdeck.js"></script>
  <script src="app.js"></script>
</body>
</html>
